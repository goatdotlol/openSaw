name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: x86_64-pc-windows-msvc

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: "rust -> target"

    - name: Build Project
      working-directory: ./rust
      run: cargo build --release

    - name: Convert Icon
      run: |
        magick "icon refined.png" -define icon:auto-resize=256,128,64,48,32,16 icon.ico
        
    - name: Compile Inno Setup Installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" installer.iss
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenSaw-Windows-Setup
        path: OpenSaw-Setup.exe
        if-no-files-found: error
        
    - name: Create Release and Upload
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "latest"
        name: "Open Saw Latest Release"
        files: OpenSaw-Setup.exe
        body: "Automated Setup Release build for Open Saw."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
